<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HelloMind — Login</title>
  <meta name="description" content="Login atau daftar akun HelloMind untuk mulai ngobrol." />
  <meta name="theme-color" content="#0a0a1a" />

  <link rel="icon" href="/static/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/login.css?v=2" />
</head>

<body>
  <!-- Ambient background removed for debugging -->

  <div class="auth-container">
    <!-- Brand -->
    <div class="auth-brand">
      <img src="/static/logo1.png" alt="HelloMind" class="auth-logo" />
      <h1 class="auth-title">HelloMind</h1>
      <p class="auth-subtitle">Teman ngobrol yang selalu hadir</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card" id="authCard">
      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Masuk</button>
        <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Daftar</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- Error/Success Message -->
      <div class="auth-message" id="authMessage"></div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="loginUsername">Username</label>
          <div class="input-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" id="loginUsername" placeholder="Masukkan username" required autocomplete="username" />
          </div>
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <div class="input-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="loginPassword" placeholder="Masukkan password" required autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="auth-submit" id="loginSubmit">
          <span class="btn-text">Masuk</span>
          <div class="btn-loader"></div>
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label for="regUsername">Username</label>
          <div class="input-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" id="regUsername" placeholder="Pilih username" required autocomplete="username" />
          </div>
        </div>
        <div class="input-group">
          <label for="regEmail">Email</label>
          <div class="input-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input type="email" id="regEmail" placeholder="Email kamu" required autocomplete="email" />
          </div>
        </div>
        <div class="input-group">
          <label for="regPassword">Password</label>
          <div class="input-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="regPassword" placeholder="Buat password (min 4 karakter)" required
              minlength="4" autocomplete="new-password" />
          </div>
        </div>
        <div class="input-group">
          <label for="regConfirm">Konfirmasi Password</label>
          <div class="input-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12" />
            </svg>
            <input type="password" id="regConfirm" placeholder="Ulangi password" required minlength="4"
              autocomplete="new-password" />
          </div>
        </div>
        <button type="submit" class="auth-submit" id="registerSubmit">
          <span class="btn-text">Daftar</span>
          <div class="btn-loader"></div>
        </button>
      </form>
    </div>

    <p class="auth-footer">© 2025 HelloMind — Politeknik Mitra Industri</p>
  </div>

  <script src="/static/login.js?v=2"></script>
</body>

</html>
